profile = "dev"

model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
review_model = "gpt-5.3-codex"

[tui]
notifications = ["agent-turn-complete", "approval-requested"]
notification_method = "auto"
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-remaining",
  "context-used",
  "context-window-size",
  "used-tokens",
  "total-input-tokens",
  "total-output-tokens",
  "five-hour-limit",
  "weekly-limit",
  "codex-version",
  "session-id",
]

[sandbox_workspace_write]
network_access = false

[profiles.dev]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
model_reasoning_effort = "medium"

[profiles.research]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
model_reasoning_effort = "high"

[profiles.readonly]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"
model_reasoning_effort = "medium"
